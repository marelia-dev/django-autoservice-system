{% extends "autoservice/base.html" %}
{% load static %}
{% load crispy_forms_tags %}
{% load i18n %}

{% block title %}Sign Up - AutoService{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <h2 class="mb-4 text-center">{% trans "Sign Up" %}</h2>
            <form method="post">
                {% csrf_token %}
                {{ form | crispy }}
                <button type="submit" class="btn btn-primary w-100">
                    {% trans "Sign Up" %}
                </button>
            </form>
            <p class="text-center mt-3">
                <a href="{% url 'login' %}" class="btn btn-link">
                    {% trans "Already registered? Log in" %}
                </a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
